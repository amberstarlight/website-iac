name: Format, Validate, and Plan

on:
  push:
    branches-ignore:
      - main

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_INPUT: 0
  TF_IN_AUTOMATION: 1

jobs:
  fmt_validate_plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: opentofu/setup-opentofu@v1
      - run: tofu init
      - run: tofu fmt -check
      - run: tofu validate
      - run: tofu plan
